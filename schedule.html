<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LockIn — Schedule</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0d1117;
      background-image:
        linear-gradient(rgba(56, 139, 253, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(56, 139, 253, 0.03) 1px, transparent 1px);
      background-size: 24px 24px;
      color: #e6edf3;
      min-height: 100vh;
      padding: 24px;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 28px;
      padding-bottom: 16px;
      border-bottom: 1px solid #21262d;
    }

    .back-btn {
      background: #21262d;
      border: 1px solid #30363d;
      color: #e6edf3;
      padding: 6px 14px;
      border-radius: 6px;
      font-size: 13px;
      cursor: pointer;
    }

    .back-btn:hover { background: #30363d; }
    h1 { font-size: 18px; font-weight: 600; }

    .description {
      font-size: 13px;
      color: #7d8590;
      margin-bottom: 24px;
      line-height: 1.6;
    }

    .form-card {
      background: #161b22;
      border: 1px solid #21262d;
      border-radius: 10px;
      padding: 20px;
      margin-bottom: 24px;
    }

    .form-title {
      font-size: 14px;
      font-weight: 600;
      color: #e6edf3;
      margin-bottom: 16px;
    }

    .form-row {
      margin-bottom: 16px;
    }

    .form-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: #7d8590;
      margin-bottom: 8px;
      display: block;
    }

    .days-row {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .day-btn {
      padding: 6px 12px;
      background: #21262d;
      border: 1px solid #30363d;
      border-radius: 6px;
      color: #7d8590;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.15s;
    }

    .day-btn.selected {
      background: #1f6feb;
      border-color: #1f6feb;
      color: white;
    }

    .time-row {
      display: flex;
      gap: 12px;
      align-items: center;
    }

    .time-row input[type="time"] {
      padding: 8px 12px;
      background: #21262d;
      border: 1px solid #30363d;
      border-radius: 6px;
      color: #e6edf3;
      font-size: 14px;
      outline: none;
      cursor: pointer;
    }

    .time-row input[type="time"]:focus {
      border-color: #1f6feb;
    }

    .time-label {
      font-size: 13px;
      color: #7d8590;
    }

    .duration-row {
      display: flex;
      gap: 6px;
    }

    .dur-btn {
      flex: 1;
      padding: 8px 0;
      background: #21262d;
      color: #8b949e;
      border: 1px solid #30363d;
      border-radius: 6px;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.15s;
    }

    .dur-btn.selected {
      background: #1f6feb;
      color: white;
      border-color: #1f6feb;
    }

    .add-schedule-btn {
      width: 100%;
      padding: 11px;
      background: #1f6feb;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 4px;
    }

    .add-schedule-btn:hover { background: #388bfd; }

    .section-title {
      font-size: 11px;
      color: #7d8590;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 12px;
    }

    .schedules-container {
      background: #161b22;
      border: 1px solid #21262d;
      border-radius: 10px;
      overflow: hidden;
    }

    .schedule-item {
      padding: 14px 16px;
      border-bottom: 1px solid #21262d;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .schedule-item:last-child { border-bottom: none; }

    .schedule-info { display: flex; flex-direction: column; gap: 4px; }

    .schedule-time {
      font-size: 16px;
      font-weight: 600;
      color: #e6edf3;
    }

    .schedule-days {
      font-size: 12px;
      color: #7d8590;
    }

    .schedule-duration {
      font-size: 12px;
      color: #388bfd;
    }

    .schedule-right {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 8px;
    }

    .toggle {
      position: relative;
      display: inline-block;
      width: 36px;
      height: 20px;
    }

    .toggle input { opacity: 0; width: 0; height: 0; }

    .slider {
      position: absolute;
      cursor: pointer;
      inset: 0;
      background: #30363d;
      border-radius: 20px;
      transition: 0.2s;
    }

    .slider::before {
      content: "";
      position: absolute;
      width: 14px;
      height: 14px;
      left: 3px;
      bottom: 3px;
      background: #7d8590;
      border-radius: 50%;
      transition: 0.2s;
    }

    .toggle input:checked + .slider { background: #1f6feb; }
    .toggle input:checked + .slider::before {
      transform: translateX(16px);
      background: white;
    }

    .delete-btn {
      background: transparent;
      border: 1px solid #30363d;
      color: #f85149;
      padding: 4px 10px;
      border-radius: 6px;
      font-size: 12px;
      cursor: pointer;
    }

    .delete-btn:hover { background: #2d1317; border-color: #f85149; }

    .empty-state {
      text-align: center;
      padding: 32px;
      color: #484f58;
    }

    .empty-state .icon { font-size: 32px; margin-bottom: 10px; }
    .empty-state p { font-size: 13px; }

    .next-session {
      background: #0d2d1a;
      border: 1px solid #238636;
      border-radius: 8px;
      padding: 12px 16px;
      margin-bottom: 20px;
      font-size: 13px;
      color: #3fb950;
      display: none;
    }

    .next-session.show { display: block; }
  </style>
</head>
<body>

  <div class="header">
    <button class="back-btn" onclick="window.close()">← Back</button>
    <h1>Schedule</h1>
  </div>
  <p class="description">
  Set recurring weekly sessions that start automatically — for example, every weekday at 8 PM. Sessions repeat every week on the days you choose. Chrome must be open for scheduled sessions to trigger.
</p>
  

  <div class="next-session" id="next-session"></div>

  <div class="form-card">
  <div class="form-title">Add new schedule</div>

  <div class="form-row">
    <label class="form-label">Schedule type</label>
    <div style="display:flex;gap:8px;">
      <button class="day-btn selected" id="type-recurring">🔁 Weekly recurring</button>
<button class="day-btn" id="type-onetime">📅 One-time date</button>
    </div>
  </div>

  <!-- recurring options -->
  <div id="recurring-options">
    <div class="form-row">
      <label class="form-label">Days (repeats every week)</label>
      <div class="days-row">
        <button class="day-btn" data-day="0">Sun</button>
        <button class="day-btn" data-day="1">Mon</button>
        <button class="day-btn" data-day="2">Tue</button>
        <button class="day-btn" data-day="3">Wed</button>
        <button class="day-btn" data-day="4">Thu</button>
        <button class="day-btn" data-day="5">Fri</button>
        <button class="day-btn" data-day="6">Sat</button>
      </div>
    </div>
  </div>

  <!-- one-time options -->
  <div id="onetime-options" style="display:none;">
    <div class="form-row">
      <label class="form-label">Date</label>
      <input type="date" id="onetime-date" style="
        padding: 8px 12px;
        background: #21262d;
        border: 1px solid #30363d;
        border-radius: 6px;
        color: #e6edf3;
        font-size: 14px;
        outline: none;
        cursor: pointer;
      ">
    </div>
  </div>

  <div class="form-row">
    <label class="form-label">Start time</label>
    <input type="time" id="start-time" value="20:00" style="
      padding: 8px 12px;
      background: #21262d;
      border: 1px solid #30363d;
      border-radius: 6px;
      color: #e6edf3;
      font-size: 14px;
      outline: none;
      cursor: pointer;
    ">
  </div>

  <div class="form-row">
  <label class="form-label">Duration</label>
  <div class="duration-row">
    <button class="dur-btn selected" data-mins="25">25m</button>
    <button class="dur-btn" data-mins="50">50m</button>
    <button class="dur-btn" data-mins="90">90m</button>
    <button class="dur-btn" data-mins="120">2h</button>
  </div>
  <div style="margin-top:8px;">
    <input type="number" id="custom-schedule-duration" placeholder="Custom minutes (e.g. 45 or 180)" min="1" max="480" style="
      width:100%;
      padding: 8px 12px;
      background: #21262d;
      border: 1px solid #30363d;
      border-radius: 6px;
      color: #e6edf3;
      font-size: 13px;
      outline: none;
    ">
  </div>
</div>

  <button class="add-schedule-btn" id="add-schedule-btn">Add Schedule</button>
</div>

  <div class="section-title">Your schedules</div>
  <div class="schedules-container" id="schedules-container"></div>

  <script src="schedule.js"></script>
</body>
</html>
