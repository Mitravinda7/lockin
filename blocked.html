<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Blocked — LockIn</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #dc2626;
      color: white;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      gap: 16px;
    }
    .icon { font-size: 72px; }
    h1 { font-size: 32px; font-weight: 700; }
    p { font-size: 16px; opacity: 0.85; max-width: 400px; line-height: 1.6; }
    .sub { font-size: 13px; opacity: 0.6; margin-top: 8px; }
  </style>
</head>
<body>
  <div class="icon">🔒</div>
  <h1>Focus. You're supposed to be studying.</h1>
  <p>This site is blocked during your study session.</p>
  <p class="sub">Close this tab and get back to work.</p>
</body>
</html>
